[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/booking.html"
  status = 301
